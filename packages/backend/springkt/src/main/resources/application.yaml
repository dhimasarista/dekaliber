server:
  port: 8080

spring:
  application:
    name: dekaliber
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dekaliber}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:nadhim}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        # NOTE: `hibernate.bytecode.provider: none` is NOT set here because this
        # Hibernate version (7.4.1) ignores that property -- BytecodeProviderInitiator
        # unconditionally ServiceLoader::loads every registered BytecodeProvider
        # regardless of config. The ByteBuddy provider is instead excluded at the
        # classpath level (see the artifact transform in build.gradle.kts) so
        # ServiceLoader finds none and Hibernate falls back to its built-in no-op
        # provider -- required for GraalVM native-image, since ByteBuddy generates
        # proxy classes at runtime via ClassLoader.defineClass, which native-image's
        # closed-world model doesn't support.
